<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForEdu - Komunitas & Ekonomi Kreatif Mahasiswa</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#e8f7f7', 500: '#2eb8b8', 600: '#269c9c', 700: '#1f7a7a' },
                        accent: { 400: '#fbbf24', 500: '#f59e0b', 600: '#d97706' }
                    }
                }
            }
        }
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Custom Styles -->
    <style>
        body { background-color: #e8f7f7; overflow-x: hidden; }
        @keyframes slideUpFade { 0% { transform: translateY(100%); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        .toast-enter { animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes heartPop { 0% { transform: scale(1); } 50% { transform: scale(1.35); } 100% { transform: scale(1); } }
        .heart-pop { animation: heartPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .avatar-option.selected { border-color: #2eb8b8; background-color: #e8f7f7; transform: scale(1.1); box-shadow: 0 4px 6px -1px rgba(46, 184, 184, 0.2); }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col relative">

    <!-- ================= AUTH SCREEN (LOGIN/REGISTER) ================= -->
    <div id="auth-screen" class="fixed inset-0 z-[100] bg-brand-50 flex flex-col justify-center items-center p-4 transition-opacity duration-300 hidden">
        <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
            <div class="absolute -top-20 -left-20 w-96 h-96 bg-brand-500/10 rounded-full blur-3xl"></div>
            <div class="absolute bottom-0 right-0 w-[500px] h-[500px] bg-accent-500/10 rounded-full blur-3xl"></div>
        </div>

        <div class="bg-white rounded-3xl shadow-xl border border-slate-100 p-6 sm:p-8 w-full max-w-md relative z-10 max-h-[95vh] overflow-y-auto">
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center bg-brand-500 text-white p-3 rounded-2xl mb-4 shadow-lg shadow-brand-500/30">
                    <i data-lucide="graduation-cap" class="w-10 h-10"></i>
                </div>
                <h1 id="auth-title" class="text-2xl font-extrabold text-slate-800 tracking-tight">Buat Akun Baru</h1>
                <p id="auth-subtitle" class="text-slate-500 text-sm mt-2">Daftar untuk mulai berjejaring di kampus!</p>
            </div>

            <form id="auth-form" onsubmit="window.submitAuth(event)" class="flex flex-col gap-4">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Username</label>
                    <input type="text" id="auth-username" required placeholder="Contoh: adrian123" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-brand-500/50 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Password</label>
                    <input type="password" id="auth-password" required placeholder="••••••••" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-brand-500/50 outline-none transition-all">
                </div>

                <div id="register-fields" class="flex flex-col gap-4">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">Nama Panggilan</label>
                        <input type="text" id="auth-name" placeholder="Contoh: Adrian P." class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-brand-500/50 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">Kampus</label>
                        <select id="auth-campus" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-brand-500/50 outline-none transition-all appearance-none cursor-pointer">
                            <optgroup label="Kampus Utama/Negeri Malang">
                                <option value="Universitas Brawijaya">Universitas Brawijaya (UB)</option>
                                <option value="Universitas Negeri Malang">Universitas Negeri Malang (UM)</option>
                                <option value="UIN Malang">UIN Maulana Malik Ibrahim</option>
                                <option value="Politeknik Negeri Malang">Politeknik Negeri Malang (POLINEMA)</option>
                                <option value="Poltekkes Kemenkes Malang">Poltekkes Kemenkes Malang (POLKESMA)</option>
                            </optgroup>
                            <optgroup label="Kampus Swasta Malang">
                                <option value="Binus Malang">Binus University (Malang)</option>
                                <option value="Universitas Muhammadiyah Malang">Universitas Muhammadiyah Malang (UMM)</option>
                                <option value="Universitas Islam Malang">Universitas Islam Malang (UNISMA)</option>
                                <option value="Universitas Merdeka Malang">Universitas Merdeka Malang (UNMER)</option>
                                <option value="Institut Asia Malang">Institut Teknologi dan Bisnis Asia Malang</option>
                                <option value="ITN Malang">Institut Teknologi Nasional (ITN) Malang</option>
                                <option value="Universitas PGRI Kanjuruhan">Universitas PGRI Kanjuruhan (UNIKAMA)</option>
                                <option value="Universitas Tribhuwana Tunggadewi">Universitas Tribhuwana Tunggadewi (UNITRI)</option>
                                <option value="Universitas Ma Chung">Universitas Ma Chung</option>
                                <option value="Universitas Widyagama">Universitas Widyagama (UWG)</option>
                                <option value="Universitas Gajayana">Universitas Gajayana (UNIGA)</option>
                                <option value="STIE Malangkucecwara">STIE Malangkucecwara (ABM)</option>
                            </optgroup>
                            <optgroup label="Luar Malang">
                                <option value="Binus Kemanggisan">Binus University (Kemanggisan)</option>
                                <option value="Binus Alam Sutera">Binus University (Alam Sutera)</option>
                                <option value="Binus Bandung">Binus University (Bandung)</option>
                                <option value="Universitas Indonesia">Universitas Indonesia</option>
                            </optgroup>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Pilih Karaktermu</label>
                        <div class="flex justify-between gap-2" id="avatar-selection-container"></div>
                        
                        <div class="mt-3 flex items-center gap-3">
                            <div class="h-px bg-slate-200 flex-1"></div>
                            <span class="text-[10px] font-bold text-slate-400 uppercase">ATAU</span>
                            <div class="h-px bg-slate-200 flex-1"></div>
                        </div>
                        
                        <div class="mt-3 flex items-center justify-center gap-3">
                            <input type="file" id="auth-avatar-upload" accept="image/*" class="hidden" onchange="window.previewAvatarUpload(event)">
                            <button type="button" onclick="document.getElementById('auth-avatar-upload').click()" class="flex items-center gap-2 text-xs font-bold text-brand-600 bg-brand-50 hover:bg-brand-100 px-4 py-2 rounded-full transition-colors border border-brand-200">
                                <i data-lucide="camera" class="w-4 h-4"></i> Unggah Foto Sendiri
                            </button>
                            <div id="custom-avatar-preview-container" class="hidden relative">
                                <img id="custom-avatar-preview" src="" class="w-10 h-10 rounded-full object-cover border-2 border-brand-500 shadow-sm">
                                <button type="button" onclick="window.removeAvatarUpload()" class="absolute -top-1 -right-1 bg-red-500 text-white rounded-full p-0.5 shadow-md"><i data-lucide="x" class="w-3 h-3"></i></button>
                            </div>
                        </div>
                    </div>
                </div>

                <button type="submit" id="auth-btn" class="w-full bg-brand-500 hover:bg-brand-600 text-white font-bold py-3.5 rounded-xl mt-2 transition-all active:scale-95 shadow-lg shadow-brand-500/25 flex justify-center items-center gap-2">
                    Daftar Sekarang <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </button>
            </form>

            <div class="mt-5 text-center">
                <p class="text-sm text-slate-500">
                    <span id="auth-switch-text">Sudah punya akun?</span> 
                    <button onclick="window.toggleAuthMode()" id="auth-switch-btn" class="text-brand-500 font-bold hover:underline">Masuk</button>
                </p>
            </div>
        </div>
    </div>

    <!-- ================= LOADING OVERLAY ================= -->
    <div id="loading-overlay" class="fixed inset-0 z-[200] bg-white flex flex-col justify-center items-center transition-opacity duration-300">
        <div class="w-12 h-12 border-4 border-brand-200 border-t-brand-500 rounded-full animate-spin"></div>
        <p class="mt-4 text-brand-500 font-bold animate-pulse text-sm">Menghubungkan Database...</p>
    </div>

    <!-- ================= SIDEBAR CONNECTIONS (KONEKSI) ================= -->
    <div id="sidebar-overlay" onclick="window.toggleSidebar()" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[150] hidden opacity-0 transition-opacity duration-300"></div>

    <!-- Panel Sidebar Kiri -->
    <div id="sidebar-panel" class="fixed top-0 left-0 h-full w-80 sm:w-96 bg-white z-[160] transform -translate-x-full transition-transform duration-300 flex flex-col shadow-2xl">
        <!-- Header -->
        <div class="h-16 border-b border-slate-100 flex items-center justify-between px-5 bg-brand-50 shrink-0">
            <h2 id="sidebar-title" class="font-bold text-brand-600 flex items-center gap-2 text-lg">
                <i data-lucide="users" class="w-5 h-5"></i> Koneksi
            </h2>
            <button onclick="window.toggleSidebar()" class="p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-200/50 rounded-full transition-colors">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- TABS NAVIGASI -->
        <div id="sidebar-tabs" class="flex border-b border-slate-100 shrink-0 bg-white">
            <button id="tab-obrolan" onclick="window.switchSidebarTab('obrolan')" class="relative flex-1 py-3 text-[10px] font-bold transition-all uppercase tracking-tighter text-brand-500 border-b-2 border-brand-500">
                Chat <span id="badge-chat" class="hidden absolute top-2 right-4 w-2 h-2 bg-red-500 rounded-full border border-white"></span>
            </button>
            <button id="tab-cari" onclick="window.switchSidebarTab('cari')" class="flex-1 py-3 text-[10px] font-bold transition-all uppercase tracking-tighter text-slate-400 border-b-2 border-transparent hover:text-slate-600">Cari Teman</button>
            <button id="tab-notif" onclick="window.switchSidebarTab('notif')" class="relative flex-1 py-3 text-[10px] font-bold transition-all uppercase tracking-tighter text-slate-400 border-b-2 border-transparent hover:text-slate-600">
                Notif <span id="badge-notif" class="hidden absolute top-2 right-4 w-2 h-2 bg-red-500 rounded-full border border-white"></span>
            </button>
        </div>

        <!-- VIEWS -->
        <div id="view-obrolan" class="flex-1 overflow-y-auto p-3 flex flex-col gap-1 bg-white"></div>
        
        <div id="view-cari" class="hidden flex-1 flex-col overflow-hidden bg-white">
            <div class="p-4 border-b border-slate-50">
                <input type="text" id="search-friend" onkeyup="window.handleSearchFriend()" placeholder="Cari username teman..." class="w-full pl-4 pr-4 py-2 bg-slate-100 rounded-xl text-sm outline-none focus:ring-2 focus:ring-brand-500/30">
            </div>
            <div id="list-cari" class="flex-1 overflow-y-auto p-3 flex flex-col gap-1"></div>
        </div>

        <div id="view-notif" class="hidden flex-1 overflow-y-auto p-3 flex flex-col gap-2 bg-slate-50"></div>

        <!-- CHAT VIEW -->
        <div id="sidebar-chat-view" class="hidden flex-1 flex-col overflow-hidden bg-slate-50 relative">
            <div class="flex-1 overflow-y-auto p-4 flex flex-col gap-3" id="chat-messages-container"></div>
            <div class="p-3 border-t border-slate-200 bg-white flex flex-col gap-2 shrink-0 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                <!-- Preview Gambar/File/Audio Chat -->
                <div id="chat-image-preview-container" class="hidden relative w-max mb-1">
                    <img id="chat-image-preview" class="h-16 rounded-lg object-cover border border-slate-200 shadow-sm">
                    <button onclick="window.removeChatImage()" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 shadow-md hover:bg-red-600"><i data-lucide="x" class="w-3 h-3"></i></button>
                </div>
                <div id="chat-file-preview-container" class="hidden relative w-full mb-1 p-2 bg-slate-100 rounded-lg flex items-center gap-2 border shadow-sm">
                    <i data-lucide="file-text" class="w-5 h-5 text-brand-500 shrink-0"></i>
                    <span id="chat-file-preview-name" class="text-xs font-semibold text-slate-700 truncate flex-1"></span>
                    <button onclick="window.removeChatFile()" class="bg-red-500 text-white rounded-full p-1 shadow-md shrink-0"><i data-lucide="x" class="w-3 h-3"></i></button>
                </div>
                <div id="chat-audio-preview-container" class="hidden relative w-full mb-1 p-2 bg-slate-100 rounded-lg flex items-center gap-2 border shadow-sm">
                    <i data-lucide="mic" class="w-5 h-5 text-brand-500 shrink-0"></i>
                    <audio id="chat-audio-preview" controls class="h-8 flex-1"></audio>
                    <button onclick="window.removeChatAudio()" class="bg-red-500 text-white rounded-full p-1 shadow-md shrink-0"><i data-lucide="x" class="w-3 h-3"></i></button>
                </div>

                <div class="flex items-center gap-2">
                    <input type="file" id="chat-image-input" accept="image/*" class="hidden" onchange="window.previewChatImage(event)">
                    <button onclick="document.getElementById('chat-image-input').click()" class="p-2 text-slate-400 hover:text-brand-500 hover:bg-brand-50 rounded-full transition-colors" title="Kirim Gambar"><i data-lucide="image" class="w-5 h-5"></i></button>
                    
                    <input type="file" id="chat-file-input" accept=".pdf,.doc,.docx,.txt" class="hidden" onchange="window.previewChatFile(event)">
                    <button onclick="document.getElementById('chat-file-input').click()" class="p-2 text-slate-400 hover:text-brand-500 hover:bg-brand-50 rounded-full transition-colors" title="Kirim Dokumen"><i data-lucide="paperclip" class="w-5 h-5"></i></button>

                    <button onclick="window.toggleChatAudioRecording()" id="btn-record-chat-audio" class="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-full transition-colors" title="Voice Note (VN)"><i data-lucide="mic" class="w-5 h-5"></i></button>

                    <input type="text" id="chat-input" placeholder="Tulis pesan..." class="flex-1 bg-slate-50 border border-slate-200 rounded-full px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-brand-500/20 transition-all" onkeypress="if(event.key === 'Enter') window.sendChatMessage()">
                    <button onclick="window.sendChatMessage()" class="bg-brand-500 text-white p-2.5 rounded-full hover:bg-brand-600 transition-colors shadow-sm active:scale-95"><i data-lucide="send" class="w-4 h-4 ml-0.5 mt-0.5"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- ================= MAIN APP WRAPPER ================= -->
    <div id="main-app" class="hidden flex-col min-h-screen">
        <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                <div class="flex items-center gap-4 sm:gap-8">
                    <button onclick="window.toggleSidebar()" class="relative p-2 -ml-2 text-slate-600 hover:bg-slate-100 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-brand-500/30">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                        <span id="global-badge" class="hidden absolute top-1.5 right-1.5 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></span>
                    </button>
                    <a href="#" class="flex items-center gap-2">
                        <div class="bg-brand-500 text-white p-1.5 rounded-lg hidden sm:block"><i data-lucide="graduation-cap" class="w-6 h-6"></i></div>
                        <span class="text-xl sm:text-2xl font-bold text-brand-500 tracking-tight">ForEdu</span>
                    </a>
                    <nav class="hidden md:flex items-center gap-6 font-medium text-slate-500">
                        <a href="#" class="text-brand-500 border-b-2 border-brand-500 py-5">Beranda</a>
                        <a href="#" onclick="window.showToast('Fitur Forum Spesifik & Live Streaming akan rilis di Next Update! Stay tuned. 🚀'); return false;" class="hover:text-brand-500 transition-colors py-5 flex items-center gap-1.5 opacity-80 hover:opacity-100 group">
                            Forum & Live
                            <span class="text-[9px] font-bold bg-amber-100 text-amber-600 px-1.5 py-0.5 rounded-md border border-amber-200 group-hover:bg-amber-500 group-hover:text-white transition-colors">NEXT</span>
                        </a>
                        <a href="#" onclick="window.showToast('Dasbor Monetisasi Lanjutan hadir di Fase 2! 💎'); return false;" class="hover:text-brand-500 transition-colors py-5 flex items-center gap-1.5 opacity-80 hover:opacity-100 group">
                            Pendapatan
                            <span class="text-[9px] font-bold bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded-md border border-slate-200">SOON</span>
                        </a>
                    </nav>
                </div>
                <div class="flex items-center gap-3 sm:gap-4">
                    <button onclick="window.toggleSidebar(); window.switchSidebarTab('notif')" class="relative p-2 text-slate-600 hover:bg-slate-100 rounded-full transition-colors hidden sm:block" title="Notifikasi">
                        <i data-lucide="bell" class="w-5 h-5"></i>
                        <span id="header-notif-badge" class="hidden absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
                    </button>
                    <div class="flex items-center gap-1.5 bg-amber-50 text-accent-600 px-3 py-1.5 rounded-full border border-amber-200 shadow-sm cursor-pointer hover:bg-amber-100 transition-colors" title="Saldo Koin Edu">
                        <i data-lucide="coins" class="w-4 h-4 fill-accent-500"></i>
                        <span id="nav-coins" class="font-bold text-sm">0</span>
                    </div>
                    <div class="relative group cursor-pointer flex items-center gap-2 border-l border-slate-200 pl-3 sm:pl-4">
                        <img id="nav-profile-pic" src="" alt="Profile" class="w-9 h-9 rounded-full object-cover border border-slate-200 group-hover:ring-2 group-hover:ring-brand-500 transition-all bg-slate-100">
                        <div class="absolute top-full right-0 mt-2 w-48 bg-white border border-slate-100 rounded-xl shadow-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-50 overflow-hidden">
                            <button onclick="window.handleLogout()" class="w-full text-left px-4 py-3 text-sm text-red-500 font-semibold hover:bg-red-50 flex items-center gap-2">
                                <i data-lucide="log-out" class="w-4 h-4"></i> Keluar Akun
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-6 flex flex-col lg:flex-row gap-6">
            <div class="w-full lg:w-2/3 flex flex-col gap-5">
                <!-- Input Postingan -->
                <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 flex flex-col gap-3">
                    <div class="flex gap-3">
                        <img id="post-input-avatar" src="" alt="Profile" class="w-10 h-10 rounded-full object-cover shrink-0 bg-slate-100 border border-slate-200">
                        <textarea id="post-text" placeholder="Ada info penting apa di kampus hari ini?" rows="2" class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm focus:ring-2 focus:ring-brand-500/20 outline-none resize-none"></textarea>
                    </div>
                    
                    <!-- Previews -->
                    <div id="image-preview-container" class="hidden pl-13 relative w-max mt-2">
                        <img id="image-preview" class="h-32 rounded-xl object-cover border border-slate-200 shadow-sm">
                        <button onclick="window.removeImage()" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 hover:bg-red-600 shadow-md"><i data-lucide="x" class="w-4 h-4"></i></button>
                    </div>
                    <div id="file-preview-container" class="hidden ml-13 relative w-max mt-2 bg-slate-50 p-3 rounded-xl border border-slate-200 shadow-sm flex items-center gap-3">
                        <div class="bg-brand-100 p-2 rounded-lg"><i data-lucide="file-text" class="w-5 h-5 text-brand-600"></i></div>
                        <span id="file-preview-name" class="text-sm font-semibold text-slate-700 truncate max-w-[200px]"></span>
                        <button onclick="window.removeFile()" class="bg-red-500 text-white rounded-full p-1 hover:bg-red-600 shadow-md ml-2"><i data-lucide="x" class="w-3 h-3"></i></button>
                    </div>
                    <div id="audio-preview-container" class="hidden ml-13 relative w-full mt-2 bg-slate-50 p-2 rounded-xl border border-slate-200 shadow-sm flex items-center gap-2">
                        <i data-lucide="mic" class="w-5 h-5 text-brand-500 shrink-0"></i>
                        <audio id="audio-preview" controls class="h-8 flex-1"></audio>
                        <button onclick="window.removeAudio()" class="bg-red-500 text-white rounded-full p-1 shadow-md shrink-0"><i data-lucide="x" class="w-3 h-3"></i></button>
                    </div>

                    <div class="flex items-center justify-between pl-12 sm:pl-13">
                        <div class="flex gap-2">
                            <input type="file" id="image-input" accept="image/*" class="hidden" onchange="window.previewImage(event)">
                            <button onclick="document.getElementById('image-input').click()" class="p-2 text-slate-400 hover:text-brand-500 hover:bg-brand-50 rounded-full transition-colors" title="Unggah Gambar"><i data-lucide="image" class="w-5 h-5"></i></button>
                            
                            <input type="file" id="file-input" accept=".pdf,.doc,.docx,.txt" class="hidden" onchange="window.previewFile(event)">
                            <button onclick="document.getElementById('file-input').click()" class="p-2 text-slate-400 hover:text-brand-500 hover:bg-brand-50 rounded-full transition-colors" title="Lampirkan Dokumen"><i data-lucide="paperclip" class="w-5 h-5"></i></button>

                            <button onclick="window.togglePostAudioRecording()" id="btn-post-record-audio" class="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-full transition-colors" title="Voice Note (VN)"><i data-lucide="mic" class="w-5 h-5"></i></button>
                        </div>
                        <button onclick="window.submitPost()" class="bg-brand-500 hover:bg-brand-600 text-white text-sm font-semibold py-2 px-5 rounded-full shadow-sm shadow-brand-500/20 transition-all active:scale-95">Kirim Post</button>
                    </div>
                </div>

                <div class="flex items-center gap-4 py-2">
                    <div class="h-px bg-slate-200 flex-1"></div><span class="text-xs font-semibold text-slate-400 uppercase tracking-widest">Feed Database</span><div class="h-px bg-slate-200 flex-1"></div>
                </div>

                <div id="feed-container" class="flex flex-col gap-5"></div>

                            <i data-lucide="map-pin" class="w-3.5 h-3.5"></i> <span id="profile-card-campus-text">Nama Kampus</span>
                            <i data-lucide="edit-3" class="w-3 h-3 ml-1 opacity-0 group-hover:opacity-100 transition-opacity text-slate-400" title="Ganti Kampus"></i>
                        </p>
                        <!-- Updated Profile Stats -->
                        <div class="grid grid-cols-3 gap-2 text-center bg-slate-50 rounded-xl p-3 border border-slate-100">

                            </div>
                            <div>
                                <div id="profile-following-count" class="text-lg font-bold text-brand-500">0</div>
                                <div class="text-[9px] font-semibold text-slate-400 uppercase tracking-wider">Mengikuti</div>

                <div class="bg-gradient-to-br from-white via-white to-amber-50/60 rounded-2xl p-6 shadow-sm border border-slate-100 relative overflow-hidden">
                    <i data-lucide="coins" class="absolute -bottom-6 -right-6 w-32 h-32 text-amber-100/50 fill-amber-100/50 -rotate-12 pointer-events-none"></i>
                    <h3 class="font-bold text-slate-700 flex items-center gap-2 mb-2"><i data-lucide="wallet" class="w-5 h-5 text-accent-500"></i> Dompet</h3>
                    <div class="mb-5 mt-4 relative z-10">
                        <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Total Saldo</p>
                        <h2 class="text-3xl font-black text-slate-800 tracking-tight"><span id="wallet-coins">0</span> <span class="text-lg text-accent-500">🪙</span></h2>

    <div id="toast-container" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[500] flex flex-col gap-2 pointer-events-none"></div>

    <!-- ================= JAVASCRIPT & FIREBASE INTEGRATION ================= -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, onSnapshot, addDoc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD4cpdFH-c_Mj6QR63R6669MS4PNJenTU8",
            authDomain: "foredu-app-c272e.firebaseapp.com",
            projectId: "foredu-app-c272e",
            storageBucket: "foredu-app-c272e.firebasestorage.app",
            messagingSenderId: "944458301454",
            appId: "1:944458301454:web:fc880a77adaf2473727c5f",
            measurementId: "G-RJCN3L97NL"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const rootDbId = 'foredu-production'; 

        let currentUser = null;
        let isLoginMode = false;
        let posts = [];
        
        let uploadedImageBase64 = null;
        let uploadedFile = null; // { name: string, url: base64 }
        let uploadedAudioBase64 = null; // Post VN
        let isPostRecording = false;
        let postMediaRecorder = null;
        let postAudioChunks = [];
        
        let openCommentSections = [];
        let postsUnsubscribe = null;
        let userUnsubscribe = null;

        // Sidebar & Social
        let allUsers = [];
        let activeChatUser = null;
        let chatUnsubscribe = null;
        
        let chatImageBase64 = null;
        let chatFile = null; // { name: string, url: base64 }
        let chatAudioBase64 = null; // VN Base64
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        
        let activeSidebarTab = 'obrolan'; 
        
        // Notifikasi state global
        window.unreadSenders = new Set();
        let globalChatListener = null;
        let notifications = [];

        // Foto Profil Kustom (Diunggah)
        let uploadedAvatarBase64 = null;

        const avatarOptions = [
            "https://api.dicebear.com/7.x/avataaars/svg?seed=Felix&backgroundColor=e8f7f7",
            "https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka&backgroundColor=fef3c7",
            "https://api.dicebear.com/7.x/avataaars/svg?seed=Jocelyn&backgroundColor=ffe4e6",
            "https://api.dicebear.com/7.x/avataaars/svg?seed=Nala&backgroundColor=dcfce3",
            "https://api.dicebear.com/7.x/avataaars/svg?seed=Leo&backgroundColor=e0e7ff"
        ];
        let selectedAvatarIndex = 0;

        window.showToast = (message) => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'bg-slate-800 text-white px-5 py-3 rounded-full shadow-xl flex items-center gap-3 toast-enter pointer-events-auto border border-slate-700/50 backdrop-blur-sm bg-slate-800/90 z-[999]';
            toast.innerHTML = `<div class="bg-brand-500/20 p-1 rounded-full text-brand-400"><i data-lucide="check-circle-2" class="w-5 h-5"></i></div><span class="text-sm font-medium tracking-wide">${message}</span>`;
            container.appendChild(toast);
            lucide.createIcons({ root: toast });
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateY(100%)'; setTimeout(() => toast.remove(), 400); }, 3500);
        };

        // ================= INISIALISASI =================
        window.initApp = async () => {
            lucide.createIcons();
            window.renderAvatarOptions();
            try { await signInAnonymously(auth); } catch (error) { window.showToast("Gagal terhubung ke Database."); return; }

            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    const savedUsername = localStorage.getItem('foredu_active_username');
                    if (savedUsername) {
                        try {
                            const userRef = doc(db, rootDbId, 'public', 'users', savedUsername);
                            
                            userUnsubscribe = onSnapshot(userRef, (docSnap) => {
                                if (docSnap.exists()) {
                                    const isFirstLoad = !currentUser;
                                    currentUser = docSnap.data();
                                    
                                    if(!currentUser.followers) currentUser.followers = [];
                                    if(!currentUser.following) currentUser.following = [];

                                    if(isFirstLoad) startApp();
                                    else {
                                        updateUserProfileUI();
                                        if(!document.getElementById('sidebar-panel').classList.contains('-translate-x-full')) {
                                            fetchUsersForSidebar();
                                        }
                                    }
                                } else {
                                    localStorage.removeItem('foredu_active_username');
                                    const authScreen = document.getElementById('auth-screen');
                                    const loadingOverlay = document.getElementById('loading-overlay');
                                    if (authScreen) authScreen.classList.remove('hidden');
                                    if (loadingOverlay) loadingOverlay.classList.add('hidden');
                                }
                            });
                            return; 
                        } catch (e) { console.error(e); }
                    }
                    const authScreen = document.getElementById('auth-screen');
                    const loadingOverlay = document.getElementById('loading-overlay');
                    if (loadingOverlay) loadingOverlay.classList.add('hidden');
                    if (authScreen) authScreen.classList.remove('hidden');
                }
            });
        }

        function startApp() {
            document.getElementById('loading-overlay').classList.add('hidden');
            const authScreen = document.getElementById('auth-screen');
            authScreen.style.opacity = '0';
            setTimeout(() => {
                authScreen.classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('main-app').classList.add('flex');
                
                updateUserProfileUI();
                listenToPosts();
                listenToUnreadChats(); 
                listenToNotifications(); 
            }, 300);
        }
        
        // ================= NOTIFIKASI & SISTEM UPDATE AVATAR =================
        let notifUnsubscribe = null;
        
        function listenToNotifications() {
            if(notifUnsubscribe) notifUnsubscribe();
            notifUnsubscribe = onSnapshot(collection(db, rootDbId, 'public', 'notifications'), (snap) => {
                notifications = [];
                snap.forEach(d => { 
                    if(d.data().to === currentUser.username) {
                        notifications.push({id: d.id, ...d.data()}); 
                    }
                });
                notifications.sort((a,b) => b.timestamp - a.timestamp);
                
                const hasUnread = notifications.some(n => !n.read);
                const badgeNotif = document.getElementById('badge-notif');
                if(badgeNotif) badgeNotif.classList.toggle('hidden', !hasUnread);
                updateGlobalBadge();
                renderNotifView();
            });
        }

        function renderNotifView() {
            const container = document.getElementById('view-notif');
            if(!container) return;
            if(notifications.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-slate-400 text-sm">Belum ada notifikasi baru.</div>`;
                return;
            }
            container.innerHTML = notifications.map(n => `
                <div class="bg-white p-3 rounded-2xl flex items-center gap-3 border border-slate-100 ${n.read ? 'opacity-70' : 'border-brand-100 shadow-sm'}">
                    <img src="${n.fromAvatar}" class="w-10 h-10 rounded-full border bg-slate-50">
                    <div class="flex-1">
                        <p class="text-sm font-bold text-slate-800">${n.fromName}</p>
                        <p class="text-[10px] text-slate-500">Mulai mengikuti Anda</p>
                    </div>
                    ${!(currentUser.following || []).includes(n.from) ? `
                        <button onclick="window.handleFollback('${n.from}', '${n.id}')" class="bg-brand-500 text-white text-[10px] font-bold px-3 py-1.5 rounded-full hover:bg-brand-600 transition-all">Follback</button>
                    ` : `<span class="text-[10px] font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded-full">Diikuti</span>`}
                </div>
            `).join('');
            lucide.createIcons();
        }

        window.handleFollback = async (target, nid) => {
            await window.toggleFollow(target);
            await updateDoc(doc(db, rootDbId, 'public', 'notifications', nid), { read: true });
        };

        function listenToUnreadChats() {
            if(globalChatListener) globalChatListener();
            globalChatListener = onSnapshot(collection(db, rootDbId, 'public', 'chat_messages'), (snap) => {
                let hasUnread = false;
                window.unreadSenders.clear();
                snap.forEach(d => {
                    const data = d.data();
                    if(data.receiver === currentUser.username && !data.read) {
                        hasUnread = true;
                        window.unreadSenders.add(data.sender);
                    }
                });
                
                const tabBadge = document.getElementById('badge-chat');
                if(tabBadge) tabBadge.classList.toggle('hidden', !hasUnread);
                updateGlobalBadge();

                if(activeSidebarTab === 'obrolan' && !document.getElementById('sidebar-panel').classList.contains('-translate-x-full')) {
                    renderSidebarViews();
                }
            });
        }
        
        function updateGlobalBadge() {
            const badgeNotif = document.getElementById('badge-notif');
            const badgeChat = document.getElementById('badge-chat');
            const hasNotif = badgeNotif && !badgeNotif.classList.contains('hidden');
            const hasChat = badgeChat && !badgeChat.classList.contains('hidden');
            
            const globalBadge = document.getElementById('global-badge');
            const headerNotifBadge = document.getElementById('header-notif-badge');
            
            if(globalBadge) globalBadge.classList.toggle('hidden', !(hasNotif || hasChat));
            if(headerNotifBadge) headerNotifBadge.classList.toggle('hidden', !hasNotif);
        }

        window.updateProfileAvatar = async (event) => {
            const file = event.target.files[0];
            if (!file) return;
            if (file.size > 909312) return window.showToast("Ukuran maksimal foto 888 KB.");
            
            const reader = new FileReader();
            reader.onload = async function(e) {
                const newAvatarBase64 = e.target.result;
                try {
                    const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', currentUser.username);
                    await updateDoc(userRef, { avatar: newAvatarBase64 });
                    window.showToast("Foto profil berhasil diperbarui!");
                } catch (err) {
                    console.error(err);
                    window.showToast("Gagal memperbarui foto profil.");
                }
            }
            reader.readAsDataURL(file);
        };

        // ================= EDIT KAMPUS PROFIL =================
        window.editCampus = async () => {
            if(!currentUser) return;
            const newCampus = prompt("Ubah Nama Kampus Anda:", currentUser.role);
            if(newCampus && newCampus.trim() !== "" && newCampus.trim() !== currentUser.role) {
                const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', currentUser.username);
                try {
                    await updateDoc(userRef, { role: newCampus.trim() });
                    window.showToast("Kampus berhasil diperbarui!");
                } catch(e) { 
                    window.showToast("Gagal memperbarui kampus."); 
                }
            }
        };

        // ================= SOCIAL: FOLLOW SYSTEM =================
        window.toggleFollow = async (targetUsername) => {
            if(!currentUser) return;
            const myRef = doc(db, rootDbId, 'public', 'users', currentUser.username);
            const targetRef = doc(db, rootDbId, 'public', 'users', targetUsername);
            const isFollowing = currentUser.following.includes(targetUsername);

            try {
                if (isFollowing) {
                    await updateDoc(myRef, { following: arrayRemove(targetUsername) });
                    await updateDoc(targetRef, { followers: arrayRemove(currentUser.username) });
                    window.showToast(`Batal mengikuti @${targetUsername}`);
                } else {
                    await updateDoc(myRef, { following: arrayUnion(targetUsername) });
                    await updateDoc(targetRef, { followers: arrayUnion(currentUser.username) });
                    
                    // Kirim Notifikasi ke Target
                    await addDoc(collection(db, rootDbId, 'public', 'notifications'), {
                        to: targetUsername, 
                        from: currentUser.username, 
                        fromName: currentUser.name, 
                        fromAvatar: currentUser.avatar,
                        timestamp: Date.now(), 
                        read: false
                    });
                    
                    window.showToast(`Berhasil mengikuti @${targetUsername}`);
                }
            } catch (e) { console.error(e); window.showToast('Gagal memproses koneksi.'); }
        };

        // ================= SIDEBAR & CHAT =================
        window.toggleSidebar = () => {
            const overlay = document.getElementById('sidebar-overlay');
            const panel = document.getElementById('sidebar-panel');
            
            if (panel.classList.contains('-translate-x-full')) {
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.remove('opacity-0'), 10);
                panel.classList.remove('-translate-x-full');
                window.switchSidebarTab(activeSidebarTab); 
                fetchUsersForSidebar();
            } else {
                overlay.classList.add('opacity-0');
                panel.classList.add('-translate-x-full');
                setTimeout(() => overlay.classList.add('hidden'), 300);
                if(chatUnsubscribe) { chatUnsubscribe(); chatUnsubscribe = null; }
            }
        };

        window.switchSidebarTab = (tab) => {
            activeSidebarTab = tab;
            activeChatUser = null;
            if(chatUnsubscribe) { chatUnsubscribe(); chatUnsubscribe = null; }

            document.getElementById('sidebar-chat-view').classList.add('hidden');
            document.getElementById('sidebar-tabs').classList.remove('hidden');
            document.getElementById('sidebar-title').innerHTML = `<i data-lucide="users" class="w-5 h-5"></i> Koneksi Teman`;

            const tabObrolan = document.getElementById('tab-obrolan');
            const tabCari = document.getElementById('tab-cari');
            const tabNotif = document.getElementById('tab-notif');
            
            const viewObrolan = document.getElementById('view-obrolan');
            const viewCari = document.getElementById('view-cari');
            const viewNotif = document.getElementById('view-notif');

            if(tabObrolan) tabObrolan.className = "relative flex-1 py-3 text-[10px] font-bold text-slate-400 border-b-2 border-transparent transition-colors hover:text-slate-600 uppercase tracking-tighter";
            if(tabCari) tabCari.className = "flex-1 py-3 text-[10px] font-bold text-slate-400 border-b-2 border-transparent transition-colors hover:text-slate-600 uppercase tracking-tighter";
            if(tabNotif) tabNotif.className = "relative flex-1 py-3 text-[10px] font-bold text-slate-400 border-b-2 border-transparent transition-colors hover:text-slate-600 uppercase tracking-tighter";

            if(viewObrolan) viewObrolan.classList.add('hidden');
            if(viewCari) { viewCari.classList.add('hidden'); viewCari.classList.remove('flex'); }
            if(viewNotif) { viewNotif.classList.add('hidden'); viewNotif.classList.remove('flex'); }

            if (tab === 'obrolan') {
                if(tabObrolan) tabObrolan.className = "relative flex-1 py-3 text-[10px] font-bold text-brand-500 border-b-2 border-brand-500 transition-colors uppercase tracking-tighter";
                if(viewObrolan) viewObrolan.classList.remove('hidden');
            } else if (tab === 'cari') {
                if(tabCari) tabCari.className = "flex-1 py-3 text-[10px] font-bold text-brand-500 border-b-2 border-brand-500 transition-colors uppercase tracking-tighter";
                if(viewCari) { viewCari.classList.remove('hidden'); viewCari.classList.add('flex'); }
            } else if (tab === 'notif') {
                if(tabNotif) tabNotif.className = "relative flex-1 py-3 text-[10px] font-bold text-brand-500 border-b-2 border-brand-500 transition-colors uppercase tracking-tighter";
                if(viewNotif) { viewNotif.classList.remove('hidden'); viewNotif.classList.add('flex'); }
                
                notifications.forEach(async n => { 
                    if(!n.read) await updateDoc(doc(db, rootDbId, 'public', 'notifications', n.id), {read: true}); 
                });
            }
            
            renderSidebarViews();
            lucide.createIcons();
        };

        async function fetchUsersForSidebar() {
            if(!currentUser) return;
            const usersRef = collection(db, rootDbId, 'public', 'users');
            try {
                const snapshot = await getDocs(usersRef);
                allUsers = [];
                snapshot.forEach(doc => {
                    if(doc.id !== currentUser.username) allUsers.push(doc.data());
                });
                renderSidebarViews();
            } catch (e) { console.error("Gagal memuat pengguna", e); }
        }

        function renderSidebarViews() {
            if(!currentUser) return;
            const myFollowing = currentUser.following || [];
            
            const obrolanContainer = document.getElementById('view-obrolan');
            if(!obrolanContainer) return;

            const followedUsers = allUsers.filter(u => myFollowing.includes(u.username));
            
            if (followedUsers.length === 0) {
                obrolanContainer.innerHTML = `<div class="text-center text-slate-400 mt-10 text-sm p-4 bg-slate-50 rounded-xl border border-slate-100">Belum mengikuti siapa pun.<br>Cari teman di tab sebelah!</div>`;
            } else {
                obrolanContainer.innerHTML = followedUsers.map(u => {
                    const hasUnread = window.unreadSenders && window.unreadSenders.has(u.username);
                    return `
                    <div onclick="window.openChat('${u.username}')" class="relative flex items-center gap-3 p-2.5 hover:bg-slate-50 rounded-xl cursor-pointer transition-colors border border-transparent hover:border-slate-100 group">
                        <div class="relative">
                            <img src="${u.avatar}" class="w-10 h-10 rounded-full bg-slate-100 border border-slate-200">
                            ${hasUnread ? '<span class="absolute top-0 right-0 w-3 h-3 bg-red-500 rounded-full border-2 border-white animate-pulse"></span>' : ''}
                        </div>
                        <div class="flex-1 overflow-hidden">
                            <div class="font-bold text-sm text-slate-800 truncate">${u.name} ${u.username === 'zkn' ? '<i data-lucide="badge-check" class="w-3.5 h-3.5 inline text-brand-500 fill-brand-50"></i>' : ''}</div>
                            <div class="text-[11px] truncate ${hasUnread ? 'text-brand-600 font-bold' : 'text-slate-500'}">${hasUnread ? 'Ada pesan baru!' : 'Ketuk untuk chat'}</div>
                        </div>
                        <i data-lucide="message-circle" class="w-5 h-5 ${hasUnread ? 'text-brand-500 fill-brand-50' : 'text-brand-300 opacity-0 group-hover:opacity-100'} transition-opacity"></i>
                    </div>`;
                }).join('');
            }

            window.handleSearchFriend(); 
            lucide.createIcons();
        }

        window.handleSearchFriend = () => {
            const query = (document.getElementById('search-friend').value || '').toLowerCase();
            const cariContainer = document.getElementById('list-cari');
            const myFollowing = currentUser.following || [];
            
            const recommendations = allUsers.filter(u => {
                if (myFollowing.includes(u.username)) return false;
                if (!query) return true;
                return u.name.toLowerCase().includes(query) || u.username.toLowerCase().includes(query);
            });

            if (recommendations.length === 0) {
                cariContainer.innerHTML = `<div class="text-center text-slate-400 mt-10 text-sm">Tidak ada rekomendasi ditemukan.</div>`;
            } else {
                cariContainer.innerHTML = recommendations.map(u => `
                    <div class="flex items-center gap-3 p-2.5 hover:bg-slate-50 rounded-xl transition-colors border border-transparent">
                        <img src="${u.avatar}" class="w-10 h-10 rounded-full bg-slate-100 border border-slate-200 object-cover">
                        <div class="flex-1 overflow-hidden">
                            <div class="font-bold text-sm text-slate-800 truncate">${u.name} ${u.username === 'zkn' ? '<i data-lucide="badge-check" class="w-3.5 h-3.5 inline text-brand-500 fill-brand-50"></i>' : ''}</div>
                            <div class="text-[11px] text-slate-500 truncate">@${u.username}</div>
                        </div>
                        <button onclick="window.toggleFollow('${u.username}')" class="shrink-0 bg-brand-50 text-brand-600 hover:bg-brand-100 font-bold text-xs px-3 py-1.5 rounded-full transition-colors">
                            Follow
                        </button>
                    </div>
                `).join('');
            }
            lucide.createIcons();
        };

        window.openChat = (username) => {
            activeChatUser = allUsers.find(u => u.username === username);
            document.getElementById('view-obrolan').classList.add('hidden');
            document.getElementById('view-cari').classList.add('hidden');
            document.getElementById('view-notif').classList.add('hidden');
            document.getElementById('sidebar-tabs').classList.add('hidden'); 
            
            document.getElementById('sidebar-chat-view').classList.remove('hidden');
            document.getElementById('sidebar-chat-view').classList.add('flex');

            document.getElementById('sidebar-title').innerHTML = `

            const creatorRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', post.authorUsername);

            try {
                let gifts = [...(post.gifts || [])];
                const existing = gifts.find(g => g.emoji === emoji);
                if (existing) existing.count += 1; else gifts.push({ emoji, count: 1 });

                await updateDoc(userRef, { coins: currentUser.coins - amount });
                await updateDoc(postRef, { gifts: gifts });
                
                const creatorSnap = await getDoc(creatorRef);
                if(creatorSnap.exists()) await updateDoc(creatorRef, { coins: creatorSnap.data().coins + amount });
                
                const rect = event.target.getBoundingClientRect();
                const flying = document.createElement('div');
                flying.innerHTML = emoji;
                flying.className = 'fixed text-5xl z-[60] pointer-events-none drop-shadow-lg';
                flying.style.left = (rect.left + (rect.width/2) - 24) + 'px'; flying.style.top = (rect.top - 20) + 'px';
                flying.style.transition = 'all 1s cubic-bezier(0.25, 1, 0.5, 1)';
                document.body.appendChild(flying);
                void flying.offsetWidth;
                requestAnimationFrame(() => { flying.style.transform = `translateY(-120px) scale(1.5)`; flying.style.opacity = '0'; });
                setTimeout(() => { flying.remove(); window.showToast(`Berhasil sawer ${emoji} (-${amount} 🪙)`); }, 800);
            } catch (err) { window.showToast('Gagal menyawer kreator.'); }
        };

        function updateUserProfileUI() {
            if(!currentUser) return;
            document.getElementById('nav-profile-pic').src = currentUser.avatar;
            document.getElementById('nav-coins').innerText = (currentUser.coins || 0).toLocaleString('id-ID');
            document.getElementById('post-input-avatar').src = currentUser.avatar;
            document.getElementById('profile-card-name').innerText = currentUser.name;
            
            const campusTextEl = document.getElementById('profile-card-campus-text');
            if (campusTextEl) {
                campusTextEl.innerText = currentUser.role || "Nama Kampus";
            }
            
            document.getElementById('profile-card-avatar').src = currentUser.avatar;
            document.getElementById('profile-card-level').innerText = currentUser.level || 'Maba';
            document.getElementById('wallet-coins').innerText = (currentUser.coins || 0).toLocaleString('id-ID');
            
            const myPostCount = posts.filter(p => p.authorUsername === currentUser.username).length;
            document.getElementById('profile-post-count').innerText = myPostCount;
            document.getElementById('profile-follower-count').innerText = (currentUser.followers || []).length;
            document.getElementById('profile-following-count').innerText = (currentUser.following || []).length;
            
            lucide.createIcons();
        }

        function getTimeAgo(ts) {
            const diff = Math.floor((Date.now() - ts) / 60000);
            if(diff < 1) return 'Baru saja';
            if(diff < 60) return `${diff} menit lalu`;
            if(diff < 1440) return `${Math.floor(diff/60)} jam lalu`;
            return `${Math.floor(diff/1440)} hari lalu`;
        }

        function renderFeedUI() {
            const container = document.getElementById('feed-container');
            container.innerHTML = '';
            if(posts.length === 0) {
                container.innerHTML = `<div class="text-center text-slate-400 py-10 bg-white rounded-2xl border border-slate-100 shadow-sm">Belum ada aktivitas di database.<br>Buat postingan pertamamu!</div>`;
                return;
            }
            posts.forEach(post => {
                const isLikedByMe = (post.likes || []).includes(currentUser.username);
                const likeCount = (post.likes || []).length;
                const commentCount = (post.commentsList || []).length;
                
                let giftsHTML = '';
                if (post.gifts && post.gifts.length > 0) {
                    const giftItems = post.gifts.map(g => `<span class="bg-pink-50 text-pink-600 px-2 py-0.5 rounded-md text-xs font-bold border border-pink-100 flex items-center gap-1">${g.emoji} x${g.count}</span>`).join('');
                    giftsHTML = `<div class="mt-3 flex items-center gap-2 flex-wrap bg-slate-50 p-2 rounded-xl border border-slate-100"><i data-lucide="award" class="w-4 h-4 text-pink-500"></i><span class="text-xs text-slate-500 font-semibold uppercase tracking-wide">Saweran:</span>${giftItems}</div>`;
                }
                
                let imageHTML = post.image ? `<img src="${post.image}" class="mt-3 rounded-xl w-full max-h-96 object-cover border border-slate-200 shadow-sm">` : '';
                
                let fileHTML = post.file ? `
                    <div class="mt-3 bg-slate-50 rounded-xl p-3 border border-slate-100 flex items-center gap-3">
                        <div class="bg-brand-100 text-brand-600 p-2 rounded-lg"><i data-lucide="file-text" class="w-6 h-6"></i></div>
                        <div class="flex-1 overflow-hidden">
                            <p class="font-semibold text-sm text-slate-800 truncate">${post.file.name}</p>
                            <p class="text-xs text-slate-500">Dokumen Lampiran</p>
                        </div>
                        <a href="${post.file.url}" download="${post.file.name}" class="bg-white border border-slate-200 text-sm font-semibold px-4 py-1.5 rounded-full hover:bg-slate-50 transition-colors">Unduh</a>
                    </div>
                ` : '';

                let audioHTML = post.audio ? `
                    <div class="mt-3">
                        <audio controls src="${post.audio}" class="h-8 max-w-full"></audio>
                    </div>
                ` : '';

                let followBtnHTML = '';
                if (post.authorUsername !== currentUser.username) {
                    const isFollowing = (currentUser.following || []).includes(post.authorUsername);
                    if (!isFollowing) {
                        followBtnHTML = `<button onclick="window.toggleFollow('${post.authorUsername}')" class="ml-auto text-[10px] font-bold bg-brand-50 text-brand-600 px-2 py-1 rounded-md hover:bg-brand-100 transition-colors">Follow</button>`;
                    }
                }

                const commentsHTML = (post.commentsList || []).map(c => {
                    if(!c.id) c.id = 'old_' + Math.random().toString(36).substr(2, 9);
                    const cIsLiked = (c.likes || []).includes(currentUser.username);
                    
                    let repliesHTML = '';
                    if (c.replies && c.replies.length > 0) {
                        repliesHTML = `<div class="pl-10 w-full flex flex-col gap-3 mt-1">` + 
                            c.replies.map(r => {
                                const rIsLiked = (r.likes || []).includes(currentUser.username);
                                return `
                                <div class="flex gap-2.5 items-start w-full">
                                    <img src="${r.avatar}" class="w-6 h-6 rounded-full border shrink-0 object-cover border-slate-100">
                                    <div class="flex-1">
                                        <div class="bg-slate-50 px-3 py-2 rounded-2xl text-xs border border-slate-100 inline-block">
                                            <span class="font-bold text-slate-800 block mb-0.5">${r.author}</span>
                                            <p class="text-slate-700">${r.text}</p>
                                        </div>
                                        <div class="flex items-center gap-3 mt-1 ml-2 text-[10px] font-bold text-slate-400">
                                            <span>${getTimeAgo(r.time || Date.now())}</span>
                                            <button onclick="window.toggleReplyLike('${post.id}', '${c.id}', '${r.id}')" class="${rIsLiked ? 'text-red-500' : 'hover:text-slate-600'} transition-colors">Suka ${(r.likes || []).length > 0 ? `(${(r.likes || []).length})` : ''}</button>
                                        </div>
                                    </div>
                                </div>`;
                            }).join('') + `</div>`;
                    }

                    return `
                    <div class="flex gap-2.5 items-start flex-col w-full">
                        <div class="flex gap-2.5 items-start w-full">
                            <img src="${c.avatar}" class="w-8 h-8 rounded-full border shrink-0 mt-0.5 object-cover border-slate-100">
                            <div class="flex-1">
                                <div class="bg-slate-50 px-3.5 py-2.5 rounded-2xl text-sm border border-slate-100 inline-block">
                                    <span class="font-bold text-slate-800 block mb-0.5">${c.author}</span>
                                    <p class="text-slate-700">${c.text}</p>
                                </div>
                                <div class="flex items-center gap-3 mt-1 ml-2 text-[10px] font-bold text-slate-400">
                                    <span>${getTimeAgo(c.time || Date.now())}</span>
                                    <button onclick="window.toggleCommentLike('${post.id}', '${c.id}')" class="${cIsLiked ? 'text-red-500' : 'hover:text-slate-600'} transition-colors">Suka ${(c.likes || []).length > 0 ? `(${(c.likes || []).length})` : ''}</button>
                                    <button onclick="window.toggleReplyInput('${c.id}')" class="hover:text-slate-600 transition-colors">Balas</button>
                                </div>
                            </div>
                        </div>
                        ${repliesHTML}
                        <div id="reply-input-${c.id}" class="hidden pl-10 w-full mt-2 flex gap-2 items-center">
                            <img src="${currentUser ? currentUser.avatar : ''}" class="w-6 h-6 rounded-full border border-slate-200 object-cover">
                            <input type="text" id="reply-text-${c.id}" placeholder="Balas komentar..." class="flex-1 bg-white border border-slate-200 rounded-full px-3 py-1.5 text-xs outline-none focus:ring-1 focus:ring-brand-500" onkeypress="if(event.key === 'Enter') window.submitReply('${post.id}', '${c.id}')">
                            <button onclick="window.submitReply('${post.id}', '${c.id}')" class="bg-brand-500 text-white p-1.5 rounded-full hover:bg-brand-600"><i data-lucide="send" class="w-3 h-3"></i></button>
                        </div>
                    </div>`;
                }).join('');

                const postHTML = `
                <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 flex flex-col gap-3">
                    <div class="flex justify-between items-start">
                        <div class="flex gap-3 w-full">
                            <img src="${post.avatar}" class="w-11 h-11 rounded-full object-cover shrink-0 bg-slate-50 border border-slate-100">
                            <div class="flex-1 flex items-start justify-between">
                                <div>
                                    <div class="flex items-center gap-1">
                                        <span class="font-bold text-slate-800">${post.authorName}</span>
                                        ${post.authorUsername === 'zkn' ? '<i data-lucide="badge-check" class="w-4 h-4 text-brand-500 fill-brand-50"></i>' : ''}
                                        <span class="text-xs text-slate-400 ml-1">· ${getTimeAgo(post.timestamp)}</span>
                                    </div>
                                    <div class="text-xs text-slate-500 flex items-center gap-1 mt-0.5"><i data-lucide="building-2" class="w-3 h-3"></i> ${post.role}</div>
                                </div>
                                ${followBtnHTML}
                            </div>
                        </div>
                    </div>
                    <div class="pl-0 sm:pl-14 text-slate-700 text-sm leading-relaxed">
                        <p>${post.content}</p>${imageHTML}${fileHTML}${audioHTML}${giftsHTML}
                    </div>
                    <div class="pl-0 sm:pl-14 flex items-center gap-2 sm:gap-6 mt-1 relative">
                        <button onclick="window.toggleLike('${post.id}')" class="flex items-center gap-1.5 ${isLikedByMe ? 'text-red-500 font-bold' : 'text-slate-400'} active:scale-90 transition-transform">
                            <div class="p-1.5 rounded-full hover:bg-brand-50"><i data-lucide="heart" class="w-4 h-4 ${isLikedByMe ? 'fill-red-500' : ''}"></i></div>
                            <span class="text-xs">${(post.likes || []).length}</span>
                        </button>
                        <button onclick="window.toggleCommentSection('${post.id}')" class="flex items-center gap-1.5 text-slate-500 hover:text-brand-500 transition-colors text-sm font-medium">
                            <div class="p-1.5 rounded-full hover:bg-brand-50"><i data-lucide="message-square" class="w-4 h-4"></i></div>
                            <span class="text-xs">${commentCount}</span>
                        </button>
                        <div class="flex-1"></div>
                        <div class="relative">
                            <button onclick="window.toggleGiftMenu(this)" class="bg-pink-50 text-pink-600 px-3 py-1.5 rounded-full text-xs font-bold border border-pink-100 flex items-center gap-1 active:scale-95 transition-all"><i data-lucide="gift" class="w-3.5 h-3.5"></i> Sawer</button>
                            <div class="gift-menu hidden absolute bottom-full right-0 mb-2 bg-white rounded-xl shadow-xl border p-2 w-48 z-10">
                                <button onclick="window.sendGift(event, '${post.id}', '☕', 10)" class="w-full flex justify-between p-2 hover:bg-slate-50 rounded-lg text-xs"><span>☕ Kopi</span><b>10 🪙</b></button>
                                <button onclick="window.sendGift(event, '${post.id}', '🍕', 100)" class="w-full flex justify-between p-2 hover:bg-slate-50 rounded-lg text-xs"><span>🍕 Pizza</span><b>100 🪙</b></button>
                                <button onclick="window.sendGift(event, '${post.id}', '💎', 1000)" class="w-full flex justify-between p-2 hover:bg-slate-50 rounded-lg text-xs"><span>💎 Sultan</span><b>1k 🪙</b></button>
                            </div>
                        </div>
                    </div>
                    <div id="comments-${post.id}" class="${openCommentSections.includes(post.id) ? '' : 'hidden'} mt-3 pt-4 border-t border-slate-100 pl-0 sm:pl-14 transition-all">
                        <div class="flex flex-col gap-4 mb-4">
                            ${commentsHTML}
                        </div>
                        <div class="flex gap-2 items-center mt-2">
                            <img src="${currentUser ? currentUser.avatar : ''}" class="w-8 h-8 rounded-full bg-slate-50 object-cover shrink-0 border border-slate-200">
                            <input type="text" id="comment-input-${post.id}" placeholder="Tulis komentar..." class="flex-1 bg-slate-50 border border-slate-200 rounded-full px-4 py-2 text-sm focus:ring-2 focus:ring-brand-500/20 outline-none transition-colors" onkeypress="if(event.key === 'Enter') window.submitComment('${post.id}')">
                            <button onclick="window.submitComment('${post.id}')" class="bg-brand-500 text-white p-2.5 rounded-full hover:bg-brand-600 transition-colors active:scale-95"><i data-lucide="send" class="w-4 h-4 -ml-0.5 mt-0.5"></i></button>
                        </div>
                    </div>
                </div>`;
                container.innerHTML += postHTML;
            });
            lucide.createIcons();
        }

        window.toggleCommentSection = (postId) => {
            const section = document.getElementById(`comments-${postId}`);
            if(section) {
                section.classList.toggle('hidden');
                if(!section.classList.contains('hidden')) { if(!openCommentSections.includes(postId)) openCommentSections.push(postId); } 
                else { openCommentSections = openCommentSections.filter(id => id !== postId); }
            }
        };

        window.toggleGiftMenu = (btn) => {
            document.querySelectorAll('.gift-menu').forEach(menu => { if (menu !== btn.nextElementSibling) menu.classList.add('hidden'); });
            btn.nextElementSibling.classList.toggle('hidden');
        };

        // Initialize App on Load
        window.addEventListener('load', () => window.initApp());
        
        // Clicks outside close gift menus
        document.addEventListener('click', (e) => {
            if(!e.target.closest('.relative')) {
                document.querySelectorAll('.gift-menu').forEach(m => m.classList.add('hidden'));
            }
        });
    </script>
</body>
</html>
